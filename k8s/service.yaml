apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  type: LoadBalancer # Crea un Load Balancer real en AWS
  selector:
    app: api-sqs
  ports:
    - protocol: TCP
      port: 80 # Puerto público por el que vas a recibir peticiones
      targetPort: 3000 # Puerto interno de tu container (debe coincidir con containerPort de arriba)