name: Deploy API to AWS ECR

on:
  push:
    branches:
      - main # O 'master', ajústalo al nombre de tu rama principal

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código de tu repositorio
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Autenticarse en AWS usando tus Secrets
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    # 3. Hacer Login en Amazon ECR
    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Construir la imagen de Docker y subirla (Push) a ECR
    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: 631860341993.dkr.ecr.us-east-2.amazonaws.com
        ECR_REPOSITORY: apiimg
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG